name: Daily COMPR.AR Scraper

on:
  schedule:
    # Corre cada 12 horas (ej: 00:00 y 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm ci || npm install

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar el Scraper
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node src/index.js

      - name: Hacer commit de la base de datos (duplicados)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/processed_processes.json
          git commit -m "chore: actualizar procesos notificados" || echo "No hay cambios para hacer commit"
          git push
